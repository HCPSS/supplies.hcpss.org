{{ define "main" }}
    <div class="container page group">
        <main id="main-content" class="main group">
            <h1>{{ .Title }}</h1>
            <div class="body-content">
                {{ .Content }}
            </div>
            <div class="sidebar">
                {{ partial "menu.html" (dict "menuID" .Params.menus "page" .) }}
            </div>
        </main>
    </div>
{{ end }}
